# Unique project key
sonar.projectKey=aceest-app

# Project name
sonar.projectName=aceest-app

# Project version
sonar.projectVersion=1.0

# Source code location. Keep the local assignment scan focused on Python code
# and Kubernetes/YAML evidence; UI navigation is covered by the UI test stage.
sonar.sources=app.py,scripts,tests,ui-tests,k8s
sonar.exclusions=generated-docs/**,docs/**/*.docx
sonar.python.version=3.11

# Pytest evidence is archived separately by Jenkins as pytest-report.html.
# Keep local SonarQube focused on static analysis and Kubernetes/YAML scanning
# so the default local quality gate does not fail on missing coverage import.
sonar.coverage.exclusions=**/*
