apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-app-ab
      variant: b
      strategy: ab-testing
  template:
    metadata:
      labels:
        app: aceest-app-ab
        variant: b
        strategy: ab-testing
    spec:
      containers:
        - name: aceest-app
          image: aceest-app:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: APP_VERSION
              value: experience-b
            - name: IMAGE_TAG
              value: experience-b
            - name: DEPLOYMENT_STRATEGY
              value: ab-testing
            - name: RELEASE_COLOR
              value: green
            - name: TRAFFIC_SEGMENT
              value: group-b
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
