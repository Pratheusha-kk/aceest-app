apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-primary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-app-shadow
      track: primary
      strategy: shadow
  template:
    metadata:
      labels:
        app: aceest-app-shadow
        track: primary
        strategy: shadow
    spec:
      containers:
        - name: aceest-app
          image: aceest-app:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: APP_VERSION
              value: shadow-primary
            - name: IMAGE_TAG
              value: shadow-primary
            - name: DEPLOYMENT_STRATEGY
              value: shadow
            - name: RELEASE_COLOR
              value: blue
            - name: TRAFFIC_SEGMENT
              value: primary
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
