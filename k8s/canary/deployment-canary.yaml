apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-app
      track: canary
      strategy: canary
  template:
    metadata:
      labels:
        app: aceest-app
        track: canary
        strategy: canary
    spec:
      containers:
        - name: aceest-app
          image: aceest-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: APP_VERSION
              value: canary
            - name: IMAGE_TAG
              value: canary
            - name: DEPLOYMENT_STRATEGY
              value: canary
            - name: RELEASE_COLOR
              value: canary
            - name: TRAFFIC_SEGMENT
              value: canary
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
