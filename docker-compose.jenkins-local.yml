services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins-local/Dockerfile
    container_name: aceest-local-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_OPTS: "--httpPort=8080"
      SONAR_HOST_URL: "http://sonarqube:9000"
      SONAR_ADMIN_USER: "admin"
      SONAR_ADMIN_PASSWORD: "Welcome@123"
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace/aceest-app
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/pratheushakk/.kube:/host-kube:ro
      - /Users/pratheushakk/.minikube:/host-minikube:ro
    depends_on:
      - sonarqube

  sonarqube:
    image: sonarqube:lts-community
    container_name: aceest-local-sonarqube
    depends_on:
      sonar-db:
        condition: service_started
      sonarqube-sysctl:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://sonar-db:5432/sonar"
      SONAR_JDBC_USERNAME: "sonar"
      SONAR_JDBC_PASSWORD: "sonar"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  sonarqube-sysctl:
    image: alpine:3.20
    container_name: aceest-local-sonarqube-sysctl
    privileged: true
    command: ["sysctl", "-w", "vm.max_map_count=262144"]

  sonar-db:
    image: postgres:15-alpine
    container_name: aceest-local-sonar-db
    environment:
      POSTGRES_USER: "sonar"
      POSTGRES_PASSWORD: "sonar"
      POSTGRES_DB: "sonar"
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
